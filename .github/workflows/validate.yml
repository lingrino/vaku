name: validate

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - main
      # Run on the rewrite branch so we can see CI results during the port.
      - cursor/go-to-rust-rewrite-*

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: pull vault image
        run: docker pull hashicorp/vault:latest
      - name: cargo test
        run: cargo test --all-features --workspace -- --nocapture --test-threads=4

  # NOTE: docs idempotency check is added once the CLI port (Phase 7) lands.
  # See: docs/cli/*.md regenerated by `cargo run -- docs docs/cli`.
